<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deck Days — Your Voyage Journal</title>
    <meta name="description" content="Log every day of your cruise — ports, food, highlights, budget, and memories. A beautiful digital travel journal for every voyage." />
    <meta name="application-name" content="Deck Days" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1B3A5C" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Deck Days" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Deck Days" />
    <meta property="og:description" content="A beautiful digital journal for every voyage." />
    <meta property="og:image" content="/logo.svg" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin="anonymous" />
    <!-- Type system: Playfair Display (display/logo/titles), Montserrat
         (eyebrows/labels/nav), Caveat (decorative tagline/accents). -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=Montserrat:wght@500;600;700&family=Caveat:wght@700&display=swap" rel="stylesheet" />

      };
      var id   = localStorage.getItem('csj-theme') || 'ocean';
      var vars = T[id] || T.ocean;
      var root = document.documentElement;
      for (var k in vars) root.style.setProperty(k, vars[k]);
    })();
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
